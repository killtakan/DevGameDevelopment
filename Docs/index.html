<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Computer Game Development 2026</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #eef4ff, #f8fbff);
      color: #1f2937;
      line-height: 1.6;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 32px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }
    .hero {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid #e5e7eb;
    }
    h1, h2 {
      color: #0f172a;
      margin-bottom: 8px;
    }
    .intro {
      font-size: 1rem;
      color: #4b5563;
    }
    .grid {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }
    .card {
      padding: 16px 18px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fbfdff;
    }
    .card h3 {
      margin: 0 0 6px;
      color: #111827;
    }
    .card p {
      margin: 0 0 10px;
      color: #4b5563;
    }
    .link-btn {
      display: inline-block;
      padding: 8px 12px;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
    .link-btn:hover {
      background: #1d4ed8;
      text-decoration: none;
    }
    .sub-links {
      margin-top: 8px;
      padding-left: 18px;
    }
    .sub-links a {
      color: #2563eb;
      text-decoration: none;
      display: inline-block;
      margin-top: 4px;
    }
    .sub-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>ผลงานวิชา Computer Game Development ปี 2026</h1>
      <p class="intro">เปิดหน้าแรกแล้วเลือกงานที่ต้องการดูได้ทันที</p>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Lab 1</h3>
        <p>แนะนำตัวเอง</p>
        <a class="link-btn" href="lab1.html">ดู Lab 1</a>
      </div>

      <div class="card">
        <h3>Lab 2</h3>
        <p>My First 2D Game</p>
        <div class="sub-links">
          <a href="game21.html">ภารกิจ 1</a><br />
          <a href="game22.html">ภารกิจ 2</a>
        </div>
      </div>

      <div class="card">
        <h3>Lab 3</h3>
        <p>งาน Lab 3</p>
        <a class="link-btn" href="lab3.html">ดู Lab 3</a>
      </div>

      <div class="card">
        <h3>Lab 4</h3>
        <p>งาน Lab 4</p>
        <a class="link-btn" href="lab4.html">ดู Lab 4</a>
      </div>

      <div class="card">
        <h3>Lab 5</h3>
        <p>งาน Lab 5</p>
        <a class="link-btn" href="lab5.html">ดู Lab 5</a>
      </div>

      <div class="card">
        <h3>Lab 6</h3>
        <p>งาน Lab 6</p>
        <a class="link-btn" href="lab6.html">ดู Lab 6</a>
      </div>
    </div>
  </div>
</body>
</html>
